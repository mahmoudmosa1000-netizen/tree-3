  {cx:452,cy:72, r:34,col:"#22521A",leaves:gl(452,72, 34,820,13)},{cx:280,cy:128,r:30,col:"#1E5018",leaves:gl(280,128,30,850,12)},
];

// ─── Ollama streaming ────────────────────────────────────
async function streamOllama(url,model,sys,question,onChunk){
  const res=await fetch(url+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model,messages:[{role:"system",content:sys},{role:"user",content:question}],stream:true,options:{temperature:.75,num_predict:200}})});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const reader=res.body.getReader(), dec=new TextDecoder();
  while(true){
    const{done,value}=await reader.read(); if(done)break;
    for(const line of dec.decode(value,{stream:true}).split("\n").filter(Boolean)){
      try{const d=JSON.parse(line); if(d.message?.content)onChunk(d.message.content);}catch{}
    }
  }
}

// ─── SVG Defs ────────────────────────────────────────────
function Defs(){
  return(
    <defs>
      <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
      </marker>
      <radialGradient id="gr-g" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stopColor="#1A3A22" stopOpacity=".6"/><stop offset="100%" stopColor="#0A1810" stopOpacity="0"/>
      </radialGradient>
      <radialGradient id="top-g" cx="50%" cy="20%" r="50%">
        <stop offset="0%" stopColor="#E879F9" stopOpacity=".06"/><stop offset="100%" stopColor="#E879F9" stopOpacity="0"/>
      </radialGradient>
      {PH.map(p=>(
        <radialGradient key={p.id} id={"ap-"+p.id} cx="38%" cy="35%" r="65%">
          <stop offset="0%" stopColor={p.c} stopOpacity=".82"/>
          <stop offset="55%" stopColor={p.c} stopOpacity=".32"/>
          <stop offset="100%" stopColor={p.c} stopOpacity=".05"/>
        </radialGradient>
      ))}
    </defs>
  );
}

// ─── Philosopher Apple Node ──────────────────────────────
function Node({p,sel,onSel,pos}){
  const{x,y}=pos||p; const a=sel===p.id; const r=a?14:12;
  return(
    <g style={{cursor:"pointer"}} onClick={()=>onSel(p.id)}>
      <circle className="glow-pulse" cx={x} cy={y} r={r+8} fill={p.c} opacity={a?.22:.08}/>
      {a&&<circle cx={x} cy={y} r={r+16} fill="none" stroke={p.c} strokeWidth={1.5} opacity={.3}/>}
      <circle cx={x} cy={y} r={r} fill={"url(#ap-"+p.id+")"} stroke={p.c} strokeWidth={a?2.2:1.2} filter="url(#glow)"/>
      <circle cx={x} cy={y} r={3.5} fill={p.c} opacity={.9}/>
      <text x={x} y={y+r+14} textAnchor="middle" fill={p.c} fontSize={a?11:9.5} fontWeight={a?600:400} fontFamily="Inter,system-ui,sans-serif" opacity={.92}>{p.s}</text>
    </g>
  );
}

      <ellipse cx="400" cy="718" rx="310" ry="58"  fill="url(#gr-g)"/>
      <ellipse cx="400" cy="712" rx="260" ry="34"  fill="#0C1A0E" opacity=".55"/>
      {BR.map(([d,w],i)=>(

// ─── Mind Map View ───────────────────────────────────────
function MindMapView({sel,onSel}){
  const conns=[];
  PH.forEach(p=>p.inf.forEach(tid=>{
    const f=MM[p.id],t=MM[tid]; if(!f||!t)return;
    const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    conns.push({f,t,col:p.c,cx:(f.x+t.x)/2-(dy/len)*32,cy:(f.y+t.y)/2+(dx/len)*16});
  }));
  return(
    <svg viewBox="0 0 800 590" style={{width:"100%",height:"100%"}} preserveAspectRatio="xMidYMid meet">
      <Defs/>
      {conns.map((c,i)=>(<path key={i} d={"M "+c.f.x+" "+c.f.y+" Q "+c.cx+" "+c.cy+" "+c.t.x+" "+c.t.y} fill="none" stroke={c.col} strokeWidth="1.2" opacity=".3" strokeDasharray="5 4" markerEnd="url(#arr)"/>))}
      {PH.map(p=>{const pos=MM[p.id];return pos?<Node key={p.id} p={p} sel={sel} onSel={id=>onSel(sel===id?null:id)} pos={pos}/>:null;})}
    </svg>
  );
}

// ─── Ollama Modal ────────────────────────────────────────

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.78)",backdropFilter:"blur(8px)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{width:440,maxWidth:"92vw",borderRadius:16,padding:"28px 26px",background:"#0A140C",border:"1px solid rgba(201,162,39,.28)"}}>
        <h3 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:900,color:"#F0E6D3",marginBottom:6}}>🦙 Lokale KI — Ollama</h3>
        <p style={{fontSize:12,color:"#3D5A3F",marginBottom:22,lineHeight:1.6}}>Kein API-Key. Kein Cloud. Die KI läuft auf deinem Rechner.</p>
        <div style={{marginBottom:14}}><label style={{fontSize:10,letterSpacing:2.5,color:"#3D5A3F",textTransform:"uppercase",display:"block",marginBottom:6}}>URL</label>
          <input value={lu} onChange={e=>setLu(e.target.value)}/></div>
        <div style={{marginBottom:18}}><label style={{fontSize:10,letterSpacing:2.5,color:"#3D5A3F",textTransform:"uppercase",display:"block",marginBottom:6}}>Modell</label>
          <select value={lm} onChange={e=>setLm(e.target.value)}>{MODELS.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
        {st&&<div style={{fontSize:12,color:st.startsWith("✓")?"#4ADE80":"#F87171",padding:"8px 12px",background:"rgba(255,255,255,.04)",borderRadius:8,marginBottom:14}}>{st}</div>}
        <div style={{background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:10,padding:"14px",marginBottom:20}}>
          <div style={{fontSize:10,color:"#C9A227",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Terminal</div>
          {["ollama pull llama3","OLLAMA_ORIGINS=* ollama serve"].map(cmd=>(
            <code key={cmd} style={{display:"block",fontSize:12,color:"#7ABF52",fontFamily:"monospace",background:"rgba(255,255,255,.06)",borderRadius:6,padding:"6px 10px",marginBottom:8}}>{cmd}</code>
          ))}

        <div style={{display:"flex",gap:8}}>
          <button onClick={test} style={{flex:1,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,color:"#A8C0AA",padding:"10px",fontSize:13}}>Verbindung testen</button>
          <button onClick={()=>{onSave(lu,lm);onClose();}} style={{flex:1,background:"#C9A227",border:"none",borderRadius:8,color:"#06090A",padding:"10px",fontSize:13,fontWeight:700}}>Speichern</button>
        </div>
      </div>
    </div>
  );
}

// ─── Sidebar + AI Chat ───────────────────────────────────
function Sidebar({p,onClose,lang,t,url,model}){
  const [q,setQ]=useState(""); const [resp,setResp]=useState(""); const [loading,setLoading]=useState(false); const [err,setErr]=useState("");
  const scrollRef=useRef(null);
  const isRtl=lang==="ar";
  const bio=lang==="en"?p.bio_en:p.bio;
  const sugg=t.sugg(p);
  useEffect(()=>{if(scrollRef.current&&resp)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;},[resp]);

  const ask=async(text)=>{
    const tx=(text||q).trim(); if(!tx||loading)return;
    setQ(tx);setLoading(true);setResp("");setErr("");
    try{
      let full="";
      await streamOllama(url,model,t.sys(p),tx,chunk=>{full+=chunk;setResp(full);});
      if(!full)setErr("Keine Antwort. "+t.setup[0]);
    }catch(e){setErr(t.setup[0]+"\n"+t.setup[1]+"\n"+t.setup[2]+"\n"+t.setup[3]);}
    setLoading(false);
  };

  return(
    <div className="sb-r" style={{position:"fixed",right:0,top:0,bottom:0,width:395,background:"rgba(4,8,5,.97)",borderLeft:"1px solid rgba(201,162,39,.18)",backdropFilter:"blur(24px)",overflowY:"auto",zIndex:200,padding:"26px 22px",direction:isRtl?"rtl":"ltr"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:10,letterSpacing:3,color:p.c,textTransform:"uppercase",fontFamily:"Inter",marginBottom:5}}>{p.era}</div>
          <h2 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:24,fontWeight:900,color:"#F0E6D3",lineHeight:1.1}}>{p.name}</h2>
          <div style={{fontSize:11,color:"#3D5A3F",marginTop:3}}>{p.life}</div>
        </div>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#3D5A3F",fontSize:18,lineHeight:1}}>✕</button>
      </div>
      <div style={{borderLeft:isRtl?"none":"3px solid "+p.c,borderRight:isRtl?"3px solid "+p.c:"none",paddingLeft:isRtl?0:14,paddingRight:isRtl?14:0,marginBottom:22}}>
        <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontStyle:"italic",color:"#C0AF90",fontSize:14,lineHeight:1.65}}>»{p.quote}«</p>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",marginBottom:9}}>{t.k.ideas}</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
          {p.ideas.map(i=>(<span key={i} style={{background:p.c+"14",border:"1px solid "+p.c+"40",color:p.c,fontSize:11.5,padding:"3px 10px",borderRadius:20}}>{i}</span>))}
        </div>
      </div>
      <div style={{marginBottom:22}}>
        <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",marginBottom:9}}>{t.k.bio}</div>
        <p style={{fontSize:13.5,lineHeight:1.72,color:"#8EA88F"}}>{bio}</p>
      </div>
      {p.inf.length>0&&(
        <div style={{marginBottom:22}}>
          <div style={{fontSize:10,letterSpacing:2.5,color:"#2E4A30",textTransform:"uppercase",marginBottom:9}}>{t.k.inf}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {p.inf.map(id=>PHM[id]&&(<span key={id} style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.12)",color:"#8AA08C",fontSize:11.5,padding:"3px 10px",borderRadius:20}}>{PHM[id].name}</span>))}
          </div>
        </div>
      )}
      <div style={{height:1,background:"linear-gradient(to right,transparent,rgba(201,162,39,.25),transparent)",margin:"20px 0"}}/>
      <div style={{fontSize:10,letterSpacing:2.5,color:"#C9A227",textTransform:"uppercase",marginBottom:12,display:"flex",alignItems:"center",gap:8}}><span>◆</span>{t.k.ai}</div>
      <p style={{fontSize:12,color:"#3D5A3F",marginBottom:12,lineHeight:1.5}}>{t.aiDesc(p.name)}</p>
      <p style={{fontSize:10,color:"#1A3A1C",marginBottom:13}}>🦙 {model} · {url}</p>
      <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:13}}>
        {sugg.map(sq=>(<button key={sq} onClick={()=>ask(sq)} style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:8,color:"#6A8C6C",fontSize:12,padding:"8px 12px",textAlign:isRtl?"right":"left"}}>{sq}</button>))}
      </div>
      <div style={{display:"flex",gap:8,marginBottom:12,flexDirection:isRtl?"row-reverse":"row"}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&ask(q)} placeholder={t.ph} dir={isRtl?"rtl":"ltr"} style={{flex:1,width:"auto"}}/>
        <button onClick={()=>ask(q)} disabled={loading} style={{background:loading?"rgba(201,162,39,.3)":"#C9A227",border:"none",borderRadius:8,color:"#06090A",fontWeight:700,fontSize:15,padding:"10px 16px",minWidth:44,flexShrink:0}}>
          {loading?"…":isRtl?"←":"→"}
        </button>
      </div>
      {loading&&!resp&&<div style={{padding:"12px 0",fontSize:13,color:"#3D5A3F",fontStyle:"italic"}}>{t.thinking(p.name)}</div>}
      {(resp||err)&&(
        <div ref={scrollRef} className="air" style={{background:"rgba(255,255,255,.04)",borderRadius:8,padding:14,fontSize:13.5,lineHeight:1.72,color:err?"#F87171":"#AECBAE",borderLeft:isRtl?"none":"3px solid "+p.c+"55",borderRight:isRtl?"3px solid "+p.c+"55":"none",whiteSpace:"pre-wrap",maxHeight:260,overflowY:"auto"}}>
          {err||resp}
        </div>
      )}
    </div>
  );
}

// ─── Header ──────────────────────────────────────────────
function Header({lang,setLang,view,setView,particles,setParticles,onCfg,t}){
  const btn=a=>({background:a?"rgba(201,162,39,.18)":"none",border:a?"1px solid rgba(201,162,39,.4)":"1px solid transparent",borderRadius:7,color:a?"#C9A227":"#2E4A30",padding:"6px 11px",fontSize:11});
  return(
    <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 20px",gap:10,flexWrap:"wrap",background:"rgba(4,8,5,.85)",borderBottom:"1px solid rgba(255,255,255,.05)",backdropFilter:"blur(12px)",position:"sticky",top:0,zIndex:100}}>
      <div style={{flexShrink:0,direction:t.dir}}>
        <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:17,fontWeight:900,letterSpacing:.5,color:"#F0E6D3"}}>{t.title}</h1>
        <div style={{fontSize:10,color:"#1A3A1C",letterSpacing:2,textTransform:"uppercase",marginTop:1}}>{t.sub}</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",justifyContent:"flex-end"}}>
        <button onClick={onCfg} style={{...btn(false),background:"rgba(255,255,255,.04)"}}>⚙ Ollama</button>
        <button onClick={()=>setParticles(p=>!p)} style={{...btn(particles),background:particles?"rgba(255,215,0,.1)":"none",border:particles?"1px solid rgba(255,215,0,.4)":"1px solid rgba(255,255,255,.1)",color:particles?"#FFD700":"#2E4A30"}}>{t.pts}</button>
        <nav style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,.04)",borderRadius:10}}>
          {t.views.map((v,i)=>{const vid=["tree","mindmap","timeline"][i];return(<button key={vid} onClick={()=>setView(vid)} style={btn(view===vid)}>{v}</button>);})}
        </nav>
        <div style={{display:"flex",gap:2,padding:"3px",background:"rgba(255,255,255,.04)",borderRadius:10}}>
          {["de","en","ar"].map(l=>(<button key={l} onClick={()=>setLang(l)} style={{...btn(lang===l),fontSize:l==="ar"?13:11}}>{T[l].l}</button>))}
        </div>
      </div>
    </header>
  );
}

// ─── Main App ─────────────────────────────────────────────
function App(){
  const [sel,setSel]=useState(null);
  const [view,setView]=useState("tree");
  const [lang,setLang]=useState(()=>localStorage.getItem("tok-lang")||"de");
  const [particles,setParticles]=useState(false);
  const [gk,setGk]=useState(0);
  const [showCfg,setShowCfg]=useState(false);
  const [url,setUrl]=useState(()=>localStorage.getItem("tok-url")||"http://localhost:11434");
  const [model,setModel]=useState(()=>localStorage.getItem("tok-model")||"llama3");

  useEffect(()=>{localStorage.setItem("tok-lang",lang);},[lang]);
  useEffect(()=>{localStorage.setItem("tok-url",url);},[url]);
  useEffect(()=>{localStorage.setItem("tok-model",model);},[model]);

  const ph=PHM[sel]; const t=T[lang];
  const onSel=id=>setSel(prev=>prev===id?null:id);
  const switchView=v=>{setView(v);if(v==="tree")setGk(k=>k+1);};

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse 100% 70% at 50% 100%,#0D2212 0%,#060B08 58%)",color:"#F0E6D3",overflow:"hidden"}}>
      <Header lang={lang} setLang={setLang} view={view} setView={switchView} particles={particles} setParticles={setParticles} onCfg={()=>setShowCfg(true)} t={t}/>
      <main style={{height:"calc(100vh - 56px)",paddingRight:ph?395:0,transition:"padding-right .32s cubic-bezier(.25,.46,.45,.94)",overflow:"hidden"}}>
        {view==="tree"    &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><TreeView sel={sel} onSel={onSel} gk={gk} particles={particles} roots={t.roots}/></div>}
        {view==="mindmap" &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><MindMapView sel={sel} onSel={onSel}/></div>}
        {view==="timeline"&&<div style={{width:"100%",height:"100%"}}><TimelineView sel={sel} onSel={onSel} lang={lang}/></div>}
      </main>
      {ph&&<Sidebar key={ph.id+"-"+lang} p={ph} onClose={()=>setSel(null)} lang={lang} t={t} url={url} model={model}/>}
      {showCfg&&<OllamaModal url={url} model={model} onSave={(u,m)=>{setUrl(u);setModel(m);}} onClose={()=>setShowCfg(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
