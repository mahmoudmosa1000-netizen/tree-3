<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Reise durch die Zeit — Tunnel</title>
<style>
  html,body{margin:0;padding:0;background:#000;overflow:hidden;height:100%;width:100%;font-family:'Georgia',serif;}
  #stage{position:relative;width:100vw;height:100vh;cursor:pointer;}
  canvas{position:absolute;top:0;left:0;}
  #quoteOverlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(2,4,8,0);pointer-events:none;z-index:20;
    transition:background 0.6s ease;
  }
  #quoteOverlay.active{background:rgba(2,4,8,0.72);}
  #quoteText{
    color:#dce9ff;font-size:clamp(20px,3.2vw,34px);max-width:78%;text-align:center;
    text-shadow:0 0 18px rgba(120,190,255,0.7);letter-spacing:0.5px;
    opacity:0;transform:translateY(12px);transition:opacity 0.8s ease,transform 0.8s ease;
    margin:0 0 18px 0;line-height:1.5;
  }
  #quoteAuthor{
    color:#9fc3e8;font-size:clamp(14px,1.6vw,18px);letter-spacing:1px;
    opacity:0;transition:opacity 0.8s ease 0.15s;margin:0;
  }
  #quoteOverlay.active #quoteText,#quoteOverlay.active #quoteAuthor{opacity:1;transform:translateY(0);}
  #quoteText[dir="rtl"]{font-family:'Traditional Arabic','Arial',serif;}
</style>
</head>
<body>
<div id="stage">
  <canvas id="c"></canvas>
  <div id="quoteOverlay">
    <p id="quoteText"></p>
    <p id="quoteAuthor"></p>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W,H,cx,cy,FOV;
function resize(){
  W = canvas.width = Math.max(1, window.innerWidth || document.documentElement.clientWidth || 1);
  H = canvas.height = Math.max(1, window.innerHeight || document.documentElement.clientHeight || 1);
  cx = W/2; cy = H/2;
  FOV = Math.max(1, Math.min(W,H)*0.62);
}
resize();
window.addEventListener('resize', resize);

// ---------- CHROMATISCHE ABERRATION (Rand-Farbversatz) ----------
let maskCanvas, maskCtx, snapCanvas, snapCtx, fringeCanvas, fringeCtx;
function setupAberrationBuffers(){
  maskCanvas = document.createElement('canvas'); maskCanvas.width=W; maskCanvas.height=H;
  maskCtx = maskCanvas.getContext('2d');
  const r = Math.max(W,H)*0.75;
  const g = maskCtx.createRadialGradient(cx,cy,r*0.32,cx,cy,r);
  g.addColorStop(0,'rgba(255,255,255,0)');
  g.addColorStop(1,'rgba(255,255,255,0.95)');
  maskCtx.fillStyle=g;
  maskCtx.fillRect(0,0,W,H);

  snapCanvas = document.createElement('canvas'); snapCanvas.width=W; snapCanvas.height=H;
  snapCtx = snapCanvas.getContext('2d');
  fringeCanvas = document.createElement('canvas'); fringeCanvas.width=W; fringeCanvas.height=H;
  fringeCtx = fringeCanvas.getContext('2d');
}
setupAberrationBuffers();
window.addEventListener('resize', setupAberrationBuffers);

function drawChromaticAberration(warp){
  const offset = 1.4 + Math.min(1,(warp||0)/9)*3.6; // stärker bei hohem Tempo
  snapCtx.clearRect(0,0,W,H);
  snapCtx.drawImage(canvas,0,0);

  // rötliche Randverschiebung nach rechts
  fringeCtx.clearRect(0,0,W,H);
  fringeCtx.drawImage(snapCanvas, offset, 0);
  fringeCtx.globalCompositeOperation = 'destination-in';
  fringeCtx.drawImage(maskCanvas,0,0);
  fringeCtx.globalCompositeOperation = 'source-over';
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.3;
  ctx.drawImage(fringeCanvas,0,0);
  ctx.restore();

  // bläuliche Randverschiebung nach links
  fringeCtx.clearRect(0,0,W,H);
  fringeCtx.drawImage(snapCanvas, -offset, 0);
  fringeCtx.globalCompositeOperation = 'destination-in';
  fringeCtx.drawImage(maskCanvas,0,0);
  fringeCtx.globalCompositeOperation = 'source-over';
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  ctx.globalAlpha = 0.3;
  ctx.drawImage(fringeCanvas,0,0);
  ctx.restore();
}

const formulas = ["E = mc²","∇·E = ρ/ε₀","Δx Δp ≥ ħ/2","e^(iπ)+1=0","S = k_B ln Ω",
"F = Gm₁m₂/r²","iħ∂ψ/∂t = Ĥψ","π = 3.14159...","∫f(x)dx","f'(x)=lim h→0","1987","x²+y²=r²",
"a²+b²=c²","∑1/n²=π²/6","ln(x)=∫1/x dx","G_μν=8πG/c⁴ T_μν","12:00","XI · XII · I","Δt → 0"];

// ---------- ORGANISCHE TURBULENZ (Pseudo-Noise) ----------
// Überlagert mehrere Sinuswellen mit unterschiedlicher Frequenz/Phase pro Achse,
// dadurch wirkt die Bewegung unregelmäßig statt starr periodisch.
function turbulence(time, seedOffset){
  const a = Math.sin(time*0.00037 + seedOffset)*1.0;
  const b = Math.sin(time*0.00091 + seedOffset*2.7 + 1.3)*0.5;
  const c = Math.sin(time*0.00163 + seedOffset*0.6 + 3.1)*0.28;
  return a+b+c; // Wertebereich ~ -1.78..1.78, unregelmäßig
}

// ---------- LINSEN-/SOG-VERZERRUNG ----------
// Zieht Punkte, die weiter vom Zentrum entfernt sind, zusätzlich zur Mitte hin —
// simuliert eine gekrümmte Raumzeit rund um das schwarze Loch.
function applyLensDistortion(x, y, strength){
  const dx = x-cx, dy = y-cy;
  const r = Math.sqrt(dx*dx+dy*dy);
  const maxR = Math.sqrt(cx*cx+cy*cy);
  const norm = Math.min(1, r/maxR);
  const pull = strength * norm*norm; // quadratisch, wirkt v.a. am Rand
  const factor = 1 - pull;
  return { x: cx+dx*factor, y: cy+dy*factor };
}

// ---------- TUNNEL PARTICLES (true 3D perspective) ----------
// Each particle sits on a ring around the z-axis of travel, at some depth z.
// As z decreases (moving toward camera / into the hole) it's projected larger.
const N = 220;
class TunnelP{
  constructor(){ this.reset(true); }
  reset(initial){
    this.a = Math.random()*Math.PI*2;           // angle around tunnel
    this.r = 110 + Math.sqrt(Math.random())*620;  // reicht deutlich weiter zum Bildrand/Umgebung
    this.z = initial ? Math.random()*2200 + 60 : 2200 + Math.random()*400;
    this.text = formulas[Math.floor(Math.random()*formulas.length)];
    this.baseSize = 9 + Math.random()*7;
    this.hue = Math.random() < 0.72 ? '150,205,255' : '255,190,120';
    this.wobble = Math.random()*Math.PI*2;
    this.wobbleSpeed = 0.4+Math.random()*0.8;
  }
  update(dt, speed, time){
    this.z -= speed*dt;
    this.wobble += this.wobbleSpeed*dt;
    if(this.z < 20){ this.reset(false); }
  }
  draw(bendX,bendY,lensStrength){
    const z = this.z;
    const scale = FOV/(FOV+z);
    const rr = this.r + Math.sin(this.wobble)*6;
    let x = cx + Math.cos(this.a)*rr*scale + bendX*scale;
    let y = cy + Math.sin(this.a)*rr*scale + bendY*scale;
    const lensed = applyLensDistortion(x,y,lensStrength);
    x = lensed.x; y = lensed.y;
    const size = Math.max(1, this.baseSize*scale*2.2);
    const alpha = Math.min(1, scale*1.4) * (z>2000 ? (2200-z)/200 : 1);
    if(alpha<=0.02) return;
    // Tiefen-Unschärfe: Objekte sehr nah an der Kamera sind leicht unscharf (Fokus-Effekt)
    const blurAmount = Math.max(0, (scale-0.62))*14;
    ctx.save();
    ctx.translate(x,y);
    if(blurAmount>0.15) ctx.filter = `blur(${blurAmount.toFixed(2)}px)`;
    ctx.font = size.toFixed(1)+'px Georgia';
    ctx.fillStyle = `rgba(${this.hue},${alpha.toFixed(3)})`;
    ctx.rotate(this.a+Math.PI/2);
    ctx.fillText(this.text,0,0);
    ctx.restore();

    // streak toward camera — Stärke wächst stufenlos mit der Geschwindigkeit
    const streakIntensity = Math.max(0, Math.min(1,(speedGlobal-60)/300));
    if(streakIntensity>0.01){
      const prevScale = FOV/(FOV+(z+speedGlobal*2.2));
      let px = cx + Math.cos(this.a)*rr*prevScale + bendX*prevScale;
      let py = cy + Math.sin(this.a)*rr*prevScale + bendY*prevScale;
      const plensed = applyLensDistortion(px,py,lensStrength);
      px = plensed.x; py = plensed.y;
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${this.hue},${(alpha*0.35*streakIntensity).toFixed(3)})`;
      ctx.lineWidth = Math.max(0.5,size*0.12);
      ctx.moveTo(px,py);
      ctx.lineTo(x,y);
      ctx.stroke();
    }
  }
}
const parts = [];
for(let i=0;i<N;i++) parts.push(new TunnelP());

// ---------- TUNNEL RINGS (structural, like a wormhole wall) ----------
const RING_COUNT = 40;
class Ring{
  constructor(i){ this.z = i*(2400/RING_COUNT); this.baseR = 230; }
}
const rings = [];
for(let i=0;i<RING_COUNT;i++) rings.push(new Ring(i));

function drawRing(ring, bendX, bendY, warp, lensStrength){
  const scale = FOV/(FOV+ring.z);
  const r = ring.baseR*scale;
  if(r<3 || r>Math.max(W,H)*1.8) return;
  let x = cx+bendX*scale, y = cy+bendY*scale;
  const lensed = applyLensDistortion(x,y,lensStrength*0.6);
  x = lensed.x; y = lensed.y;
  const alpha = Math.min(0.62, scale*0.85) * (0.45+warp*0.06);
  ctx.beginPath();
  ctx.strokeStyle = `rgba(150,200,255,${alpha.toFixed(3)})`;
  ctx.lineWidth = Math.max(0.4, 1.8*scale);
  const ringBlur = Math.max(0, (scale-0.7))*10;
  if(ringBlur>0.15) ctx.filter = `blur(${ringBlur.toFixed(2)}px)`;
  // slightly elliptical + rotated for organic wormhole feel
  ctx.ellipse(x,y,r,r*0.94,Math.sin(ring.z*0.002+timeGlobal*0.0003)*0.15,0,Math.PI*2);
  ctx.stroke();
  ctx.filter = 'none';
}

// ---------- HOLE / VORTEX CORE ----------
function drawHole(time, warp){
  const safeWarp = Number.isFinite(warp) ? warp : 0;
  // Puls-Rhythmus wird von der Warp-Geschwindigkeit angetrieben: schneller & unruhiger bei hohem Tempo
  const pulseSpeed = 0.0011 + safeWarp*0.00018;
  const pulseDepth = 0.035 + Math.min(1,safeWarp/9)*0.05;
  const heartbeat = Math.sin(time*pulseSpeed) + Math.sin(time*pulseSpeed*2.3)*0.35; // unregelmäßiger, organischer
  const pulse = 1 + heartbeat*pulseDepth;
  let holeR = Math.min(W,H)*0.075*pulse*(1-Math.min(0.4,safeWarp*0.05));
  if(!Number.isFinite(holeR) || holeR < 0.5) holeR = 0.5;
  let ringR = holeR*2.15;
  if(!Number.isFinite(ringR) || ringR <= holeR) ringR = holeR*2.15 + 1;
  const grad = ctx.createRadialGradient(cx,cy,holeR*0.55,cx,cy,ringR*1.7);
  grad.addColorStop(0,'rgba(0,0,0,1)');
  grad.addColorStop(0.34,'rgba(0,0,0,1)');
  grad.addColorStop(0.5,'rgba(255,185,95,0.95)');
  grad.addColorStop(0.63,'rgba(255,140,60,0.5)');
  grad.addColorStop(1,'rgba(255,140,60,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx,cy,ringR*1.7,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.fillStyle = '#000';
  ctx.arc(cx,cy,holeR,0,Math.PI*2);
  ctx.fill();
}

// ---------- VIGNETTE (dunkler Tunnelrand — verstärkt das "Ich bin drin"-Gefühl) ----------
function drawVignette(){
  const r = Math.max(W,H)*0.75;
  const grad = ctx.createRadialGradient(cx,cy,r*0.28,cx,cy,r);
  grad.addColorStop(0,'rgba(0,0,0,0)');
  grad.addColorStop(0.6,'rgba(0,0,0,0.25)');
  grad.addColorStop(1,'rgba(0,0,0,0.85)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);
}

// ---------- RADIAL SPEED LINES (only during high warp) ----------
const speedSymbols = ["∫","Δ","∑","π","ħ","∇","∞","√","≥","φ","λ","Ω","∂","e^iπ","c²"];
function randomNumberSymbol(){
  const r = Math.random();
  if(r<0.4) return String(Math.floor(Math.random()*10));           // einzelne Ziffer
  if(r<0.75) return String(Math.floor(Math.random()*900)+10);       // 2-3-stellige Zahl
  return (Math.random()*9+1).toFixed(2);                            // Dezimalzahl
}
const speedLineData = [];
(function initSpeedLines(){
  const count = 26;
  for(let i=0;i<count;i++){
    speedLineData.push({
      baseAngle: (i/count)*Math.PI*2,
      symbol: Math.random()<0.5 ? speedSymbols[Math.floor(Math.random()*speedSymbols.length)] : randomNumberSymbol(),
      jitter: Math.random()*0.4,
      symSize: 11+Math.random()*8
    });
  }
})();

function drawSpeedLines(warp){
  const intensity = Math.max(0, Math.min(1,(warp-0.6)/6)); // stufenlos 0..1, kein harter Sprung
  if(intensity<=0.001) return;
  const maxReach = Math.sqrt(cx*cx+cy*cy)*1.05; // bis über die Bildecken hinaus
  const inner = Math.min(W,H)*0.09;
  const outer = inner + (maxReach-inner)*intensity;
  ctx.save();
  speedLineData.forEach(s=>{
    const a = s.baseAngle + timeGlobal*0.0002;
    const x1 = cx+Math.cos(a)*inner, y1 = cy+Math.sin(a)*inner;
    const x2 = cx+Math.cos(a)*outer, y2 = cy+Math.sin(a)*outer;
    const grad = ctx.createLinearGradient(x1,y1,x2,y2);
    grad.addColorStop(0, `rgba(180,215,255,${(intensity*0.55).toFixed(3)})`);
    grad.addColorStop(1, `rgba(180,215,255,0)`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();

    // mathematisches Symbol reitet auf der Linie nach außen, in Zeitschleife wiederholend
    const cyclePos = ((timeGlobal*0.00035*(0.6+intensity)) + s.jitter) % 1;
    const symR = inner + (outer-inner)*cyclePos;
    const sx = cx+Math.cos(a)*symR, sy = cy+Math.sin(a)*symR;
    const symAlpha = intensity*0.8*(1-cyclePos*0.7);
    if(symAlpha>0.02){
      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(a+Math.PI/2);
      ctx.font = (s.symSize*(0.6+cyclePos*0.8)).toFixed(1)+'px Georgia';
      ctx.fillStyle = `rgba(200,225,255,${symAlpha.toFixed(3)})`;
      ctx.fillText(s.symbol,0,0);
      ctx.restore();
    }
  });
  ctx.restore();
}

// ---------- KONTINUIERLICHER 5-SEKUNDEN-LOOP ----------
// Kein Szenenwechsel, kein Sprung: warp folgt einer glatten, sich
// wiederholenden Kurve (Sog -> Höchstgeschwindigkeit -> Ausklang -> erneut).
const LOOP_DURATION = 5; // Sekunden
let t = 0;
let warp = 8.4;
let playing = true;
let speedGlobal = 1;
let timeGlobal = 0;
let last = performance.now();

function step(now){
  requestAnimationFrame(step);
  if(!playing) { last = now; return; }
  const dt = Math.min(0.05,(now-last)/1000);
  last = now;
  timeGlobal = now;
  t += dt;

  // WARP bleibt durchgehend hoch bei 9.0, nur minimale, kontinuierliche Schwankung
  const phase = (t % LOOP_DURATION) / LOOP_DURATION;      // 0..1, für sanfte Mikro-Variation
  const micro = 0.5 - 0.5*Math.cos(phase*Math.PI*2);       // 0..1..0, glatt, kein Sprung
  const target = 8.4 + micro*0.6;                           // pendelt sanft zwischen 8.4 und 9.0
  warp += (target-warp)*0.08;
  if(!Number.isFinite(warp)) warp = target;
  speedGlobal = 60*warp*(1+Math.sin(now*0.0009)*0.03);
  if(!Number.isFinite(speedGlobal)) speedGlobal = 60;

  // Text bleibt konstant sichtbar, keine Unterbrechung/kein Pulsieren

  // trail fade — stronger fade at high warp = motion blur streaking effect
  ctx.fillStyle = `rgba(3,5,10,${Math.min(0.55,0.22+warp*0.03)})`;
  ctx.fillRect(0,0,W,H);

  const turbX = turbulence(now, 0.0);
  const turbY = turbulence(now, 5.4); // anderer Seed = asymmetrisch zur X-Achse
  const bendX = turbX*20*Math.min(1,warp/3) + (Math.random()-0.5)*warp*0.4;
  const bendY = turbY*15*Math.min(1,warp/3) + (Math.random()-0.5)*warp*0.4;
  const lensStrength = 0.18 + Math.min(1,warp/9)*0.22; // stärkere Krümmung bei höherem Tempo

  rings.forEach(r=>{
    r.z -= speedGlobal*dt;
    if(r.z<10) r.z += 2400;
    drawRing(r,bendX,bendY,warp,lensStrength);
  });

  parts.forEach(p=>{ p.update(dt,speedGlobal,now); p.draw(bendX,bendY,lensStrength); });

  drawSpeedLines(warp);
  drawHole(now,warp);
  drawVignette();
  drawChromaticAberration(warp);
}
requestAnimationFrame(step);

// ---------- ZITAT-OVERLAY (per Klick, sprachabhängig) ----------
(function setupQuote(){
  const overlay = document.getElementById('quoteOverlay');
  const textEl = document.getElementById('quoteText');
  const authorEl = document.getElementById('quoteAuthor');

  const lang = (navigator.language || navigator.userLanguage || 'de').toLowerCase();
  const isArabic = lang.startsWith('ar');

  if(isArabic){
    textEl.setAttribute('dir','rtl');
    authorEl.setAttribute('dir','rtl');
    textEl.textContent = '«الرياضيات هي اللغة التي كتب بها الله الكون.»';
    authorEl.textContent = '— غاليليو غاليلي';
  } else {
    textEl.removeAttribute('dir');
    authorEl.removeAttribute('dir');
    textEl.textContent = '„Die Mathematik ist die Sprache, mit der Gott das Universum geschrieben hat.“';
    authorEl.textContent = '— Galileo Galilei';
  }

  let visible = false;
  document.getElementById('stage').addEventListener('click', ()=>{
    visible = !visible;
    overlay.classList.toggle('active', visible);
    overlay.style.pointerEvents = visible ? 'auto' : 'none';
  });
})();

</script>
</body>
</html>
