function gl(cx,cy,r,seed,n=16){
  return Array.from({length:n},(_,i)=>{
    const a=(seed*.618+i*137.508)*Math.PI/180, d=Math.sqrt((i+.5)/n)*r;
    return{x:+(cx+Math.cos(a)*d).toFixed(1),y:+(cy+Math.sin(a)*d).toFixed(1),w:5.5+(seed+i*7)%7,h:3+(seed+i*5)%4,r:(seed*31+i*43)%360,o:.52+(seed+i*13)%6*.08};
  });
}

// ─── Ollama streaming ────────────────────────────────────
async function streamOllama(url,model,sys,question,onChunk){
  const res=await fetch(url+"/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model,messages:[{role:"system",content:sys},{role:"user",content:question}],stream:true,options:{temperature:.75,num_predict:200}})});
  if(!res.ok) throw new Error("HTTP "+res.status);
  const reader=res.body.getReader(), dec=new TextDecoder();
  while(true){
    const{done,value}=await reader.read(); if(done)break;
    for(const line of dec.decode(value,{stream:true}).split("\n").filter(Boolean)){
      try{const d=JSON.parse(line); if(d.message?.content)onChunk(d.message.content);}catch{}
    }
  }
}

// ─── Mind Map View ───────────────────────────────────────
function MindMapView({sel,onSel}){
  const conns=[];
  PH.forEach(p=>p.inf.forEach(tid=>{
    const f=MM[p.id],t=MM[tid]; if(!f||!t)return;
    const dx=t.x-f.x,dy=t.y-f.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    conns.push({f,t,col:p.c,cx:(f.x+t.x)/2-(dy/len)*32,cy:(f.y+t.y)/2+(dx/len)*16});
  }));
  return(
    <svg viewBox="0 0 800 590" style={{width:"100%",height:"100%"}} preserveAspectRatio="xMidYMid meet">
      <Defs/>
      {conns.map((c,i)=>(<path key={i} d={"M "+c.f.x+" "+c.f.y+" Q "+c.cx+" "+c.cy+" "+c.t.x+" "+c.t.y} fill="none" stroke={c.col} strokeWidth="1.2" opacity=".3" strokeDasharray="5 4" markerEnd="url(#arr)"/>))}
      {PH.map(p=>{const pos=MM[p.id];return pos?<Node key={p.id} p={p} sel={sel} onSel={id=>onSel(sel===id?null:id)} pos={pos}/>:null;})}
    </svg>
  );
}

// ─── Quiz View ────────────────────────────────────────────
function QuizView({lang}){
  const isRtl=lang==="ar";
  const initSc=()=>{try{return JSON.parse(localStorage.getItem("tok-score")||"null")||{c:0,t:0,s:0};}catch{return{c:0,t:0,s:0};}};
  const [qdata,setQdata]=useState(null);
  const [chosen,setChosen]=useState(null);
  const [score,setScore]=useState(initSc);

  function sh(a){return[...a].sort(()=>Math.random()-.5);}

  function next(){
    const types=["quote","idea","era"],type=types[Math.floor(Math.random()*types.length)];
    const cor=PH[Math.floor(Math.random()*PH.length)];
    const wrongs=sh(PH.filter(p=>p.id!==cor.id)).slice(0,3);
    const opts=sh([cor,...wrongs]).map(p=>({id:p.id,label:p.name,life:p.life,c:p.c,ok:p.id===cor.id}));
    const SUB={quote:{de:"Wer hat das gesagt?",en:"Who said this?",ar:"من قال هذا؟"},
               idea:{de:"Wessen Idee ist das?",en:"Whose idea is this?",ar:"من صاحب هذه الفكرة؟"},
               era:{de:"Wer gehört zu dieser Epoche?",en:"Who belongs to this era?",ar:"من ينتمي إلى هذا العصر؟"}};
    let pr="";
    if(type==="quote")pr="»"+cor.quote+"«";
    else if(type==="idea")pr='"'+cor.ideas[Math.floor(Math.random()*cor.ideas.length)]+'"';
    else pr=cor.era+" · "+cor.life;
    setQdata({pr,sub:SUB[type][lang],opts,cor});
    setChosen(null);
  }

  useEffect(()=>{next();},[lang]);

  const pick=(opt)=>{
    if(chosen)return;
    setChosen(opt.id);
    const ns={c:score.c+(opt.ok?1:0),t:score.t+1,s:opt.ok?score.s+1:0};
    setScore(ns);
    try{localStorage.setItem("tok-score",JSON.stringify(ns));}catch{}
  };
  const reset=()=>{const z={c:0,t:0,s:0};setScore(z);try{localStorage.setItem("tok-score",JSON.stringify(z));}catch{}};


  // Quiz keyboard nav
  useEffect(()=>{
    const h=(e)=>{
      const tag=document.activeElement?.tagName?.toUpperCase();
      if(tag==='INPUT'||tag==='TEXTAREA')return;
      if(['1','2','3','4'].includes(e.key)&&qdata){
        const i=parseInt(e.key)-1;
        if(qdata.opts[i])pick(qdata.opts[i]);
      }
      if((e.key==='n'||e.key==='N'||e.key===' ')&&chosen){e.preventDefault();next();}
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[qdata,chosen,score]);

  if(!qdata)return null;
  const done=!!chosen; const won=done&&qdata.opts.find(o=>o.id===chosen)?.ok;
  const L={
    next:{de:"Nächste Frage →",en:"Next question →",ar:"→ السؤال التالي"},
    right:{de:"Richtig ✓",en:"Correct ✓",ar:"صحيح ✓"},
    wrong:{de:"Falsch ✗",en:"Wrong ✗",ar:"خطأ ✗"},
    reset:{de:"Zurücksetzen",en:"Reset",ar:"إعادة"},
    score:{de:"Richtig",en:"Correct",ar:"صحيح"},
    streak:{de:"Serie 🔥",en:"Streak 🔥",ar:"سلسلة 🔥"},
    acc:{de:"Genauigkeit",en:"Accuracy",ar:"دقة"},
    qs:{de:"Fragen",en:"Questions",ar:"أسئلة"},
  };
  return(
    <div dir={isRtl?"rtl":"ltr"} style={{height:"100%",overflowY:"auto",display:"flex",flexDirection:"column",alignItems:"center",padding:"22px 16px",gap:18,background:"radial-gradient(ellipse 80% 60% at 50% 100%,#0A1F0C,#060B08 70%)"}}>

      {/* Score strip */}
      <div style={{display:"flex",gap:12,alignItems:"center",background:"rgba(8,16,10,.85)",border:"1px solid rgba(255,255,255,.08)",borderRadius:14,padding:"11px 18px",flexWrap:"wrap",justifyContent:"center"}}>
        {[
          {v:score.c+"/"+score.t,l:L.score[lang],c:"#C9A227"},
          {v:score.s,l:L.streak[lang],c:score.s>=5?"#F87171":score.s>=2?"#F59E0B":"#3D5A3F"},
          ...(score.t>0?[{v:Math.round(score.c/score.t*100)+"%",l:L.acc[lang],c:"#34D399"}]:[])
        ].map((it,i)=>(
          <React.Fragment key={i}>
            {i>0&&<div style={{width:1,height:34,background:"rgba(255,255,255,.07)"}}/>}
            <div style={{textAlign:"center",minWidth:52}}>
              <div style={{fontSize:22,fontWeight:900,fontFamily:"'Playfair Display',Georgia,serif",color:it.c}}>{it.v}</div>
              <div style={{fontSize:9,color:"#3D5A3F",letterSpacing:1.5,textTransform:"uppercase"}}>{it.l}</div>
            </div>
          </React.Fragment>
        ))}
        <div style={{width:1,height:34,background:"rgba(255,255,255,.07)"}}/>
        <button onClick={reset} style={{background:"none",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#3D5A3F",fontSize:11,padding:"5px 10px"}}>{L.reset[lang]}</button>
      </div>

      {/* Question card */}
      <div style={{maxWidth:560,width:"100%",background:"rgba(8,14,10,.92)",border:"1px solid rgba(201,162,39,.22)",borderRadius:20,padding:"28px 24px",backdropFilter:"blur(20px)"}}>
        <div style={{fontSize:10,letterSpacing:3,color:qdata.cor.c,textTransform:"uppercase",textAlign:"center",marginBottom:12,fontFamily:"Inter,sans-serif"}}>{qdata.sub}</div>
        <div style={{minHeight:88,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:24,padding:"0 4px"}}>
          <p style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:18,fontWeight:700,color:"#F0E6D3",textAlign:"center",lineHeight:1.55}}>{qdata.pr}</p>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}>
          {qdata.opts.map(opt=>{
            let bg="rgba(255,255,255,.05)",bc="rgba(255,255,255,.1)",fc="#9AB09C";
            if(done){
              if(opt.ok){bg="rgba(74,222,128,.14)";bc="#4ADE80";fc="#4ADE80";}
              else if(opt.id===chosen){bg="rgba(248,113,113,.12)";bc="#F87171";fc="#F87171";}
              else{bg="rgba(255,255,255,.02)";bc="rgba(255,255,255,.04)";fc="#2E4A30";}
            }
            return(
              <button key={opt.id} onClick={()=>pick(opt)} title={"Taste "+(i+1)} style={{background:bg,border:"1px solid "+bc,borderRadius:12,padding:"13px 11px",color:fc,fontFamily:"Inter,sans-serif",fontSize:12.5,fontWeight:done&&opt.ok?700:400,textAlign:"center",lineHeight:1.4,cursor:done?"default":"pointer",transition:"all .25s"}}>
                {opt.label}
                {done&&opt.ok&&<span style={{display:"block",fontSize:9,marginTop:3,opacity:.6}}>{opt.life}</span>}
              </button>
            );
          })}
        </div>
        {done&&(
          <div style={{marginTop:20,textAlign:"center"}}>
            <div style={{fontSize:20,fontWeight:900,fontFamily:"'Playfair Display',Georgia,serif",color:won?"#4ADE80":"#F87171",marginBottom:4}}>{won?L.right[lang]:L.wrong[lang]}</div>
            {!won&&<p style={{fontSize:12.5,color:"#8EA88F",marginBottom:4,fontFamily:"Inter,sans-serif"}}>→ {qdata.cor.name}</p>}
            <button onClick={next} style={{marginTop:10,background:"#C9A227",border:"none",borderRadius:10,color:"#06090A",fontWeight:700,fontSize:13.5,padding:"11px 30px",cursor:"pointer",fontFamily:"Inter,sans-serif"}}>
              {L.next[lang]}
            </button>
          </div>
        )}
      </div>

      {/* Progress bar */}
      {score.t>0&&(
        <div style={{maxWidth:320,width:"100%"}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#2E4A30",marginBottom:5,fontFamily:"Inter,sans-serif"}}>

        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────
function App(){
  const [sel,setSel]=useState(null);
  const [search,setSearch]=useState("");
  const [conceptFilter,setConceptFilter]=useState(null);
  const [studied,setStudied]=useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("tok-studied")||"[]"));}catch{return new Set();}});
  const [toast,setToast]=useState(null);
  const showToast=(msg,dur=3500)=>{setToast(msg);setTimeout(()=>setToast(null),dur);};
  const [view,setView]=useState("tree");
  const [lang,setLang]=useState(()=>localStorage.getItem("tok-lang")||"de");
  const [particles,setParticles]=useState(false);
  const [gk,setGk]=useState(0);
  const [showCfg,setShowCfg]=useState(false);
  const [url,setUrl]=useState(()=>localStorage.getItem("tok-url")||"http://localhost:11434");
  const [model,setModel]=useState(()=>localStorage.getItem("tok-model")||"llama3");

  useEffect(()=>{localStorage.setItem("tok-lang",lang);},[lang]);
  useEffect(()=>{localStorage.setItem("tok-url",url);},[url]);
  useEffect(()=>{localStorage.setItem("tok-model",model);},[model]);

  const ph=PHM[sel]; const t=T[lang];
  const shareLink=(pid)=>{
    const url=location.origin+location.pathname+'#philosopher='+pid;
    navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link kopiert!')).catch(()=>showToast('🔗 '+url));
  };
  const downloadSelf=()=>{
    const blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='tree-of-knowledge.html'; a.click(); URL.revokeObjectURL(a.href);
    showToast('⬇ tree-of-knowledge.html gespeichert');
  };
  const discoverRandom=()=>{
    const pool=PH.filter(p=>!studied.has(p.id));
    const pick=(pool.length>0?pool:PH)[Math.floor(Math.random()*((pool.length>0?pool:PH).length))];
    onSel(pick.id);
    if(view!=="tree")switchView("tree");
    showToast("🎲 "+pick.name+" · "+pick.era,2500);
  };
  const filtered=conceptFilter?PH.filter(p=>p.ideas.some(i=>i.toLowerCase().includes(conceptFilter.toLowerCase()))):search.trim()?PH.filter(p=>p.name.toLowerCase().includes(search.toLowerCase())||p.era.toLowerCase().includes(search.toLowerCase())||p.ideas.some(i=>i.toLowerCase().includes(search.toLowerCase()))):PH;
  const onSel=(id)=>{
    setSel(prev=>{
      if(prev===id)return null;
      if(id){
        const ns=new Set([...studied,id]);
        setStudied(ns);
        localStorage.setItem("tok-studied",JSON.stringify([...ns]));
        if(ns.size>=PH.length)setTimeout(()=>showToast("🎉 Alle "+PH.length+" Philosophen erkundet! Wissensbaum vollständig."),400);
      }
      return id;
    });
  };
  const switchView=v=>{setView(v);if(v==="tree")setGk(k=>k+1);};
  const views5=[t.views[0],t.views[1],t.views[2],lang==="ar"?"🌌 الكون":lang==="en"?"🌌 Galaxy":"🌌 Galaxie",lang==="ar"?"🎮 اختبار":lang==="en"?"🎮 Quiz":"🎮 Quiz"];



  // ─── Hash-Routing (teilbare Links) ─────────────────────────────────────────
  useEffect(()=>{
    const h=location.hash.replace('#','');
    const p=new URLSearchParams(h);
    const pid=p.get('philosopher');
    if(pid&&PHM[pid]) setSel(pid);
    const v=p.get('view');
    if(v&&['tree','mindmap','timeline','galaxy','quiz'].includes(v)) setView(v);
  },[]);

  useEffect(()=>{
    const params=new URLSearchParams();
    if(sel) params.set('philosopher',sel);
    if(view!=='tree') params.set('view',view);
    const hash=params.toString();
    history.replaceState(null,'',hash?'#'+hash:location.pathname);
  },[sel,view]);

  // ─── Keyboard shortcuts ─────────────────────────────────────────────
  useEffect(()=>{
    const h=(e)=>{
      const tag=document.activeElement?.tagName?.toUpperCase();
      if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
      if(e.key==='Escape'){setSel(null);setConceptFilter(null);setSearch('');}
      if(e.key==='?'||e.key==='ß'){
        const tips=['⌨ Shortcuts: T=Baum M=MindMap L=Timeline G=Galaxie Q=Quiz','ESC=Sidebar schließen 1-4=Quiz-Antwort N=Nächste Frage'];
        alert(tips.join('\n'));
      }
      const vm={t:'tree',m:'mindmap',l:'timeline',g:'galaxy',q:'quiz'};
      if(vm[e.key.toLowerCase()]&&!e.ctrlKey&&!e.metaKey&&!e.altKey)switchView(vm[e.key.toLowerCase()]);
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[]);

  return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse 100% 70% at 50% 100%,#0D2212 0%,#060B08 58%)",color:"#F0E6D3",overflow:"hidden"}}>
      <Header lang={lang} setLang={setLang} view={view} setView={switchView} particles={particles} setParticles={setParticles} onCfg={()=>setShowCfg(true)} t={t} search={search} setSearch={setSearch} views5={views5} cFilter={conceptFilter} setCFilter={setConceptFilter} studied={studied} onDiscover={discoverRandom} onDownload={downloadSelf}/>
      <main style={{height:"calc(100vh - 56px)",paddingRight:ph?395:0,transition:"padding-right .32s cubic-bezier(.25,.46,.45,.94)",overflow:"hidden"}}>
        {view==="galaxy"  &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><GalaxyView phs={PH} filtered={filtered} sel={sel} onSel={onSel}/></div>}
        {view==="quiz"    &&<div style={{width:"100%",height:"100%"}}><QuizView lang={lang}/></div>}
        {view==="quiz"    &&<div style={{width:"100%",height:"100%"}}><QuizView lang={lang}/></div>}
        {view==="tree"    &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><TreeView sel={sel} onSel={onSel} gk={gk} particles={particles} roots={t.roots} filtered={filtered} studied={studied}/></div>}
        {view==="mindmap" &&<div style={{width:"100%",height:"100%",padding:"4px 12px 0"}}><MindMapView sel={sel} onSel={onSel}/></div>}
        {view==="timeline"&&<div style={{width:"100%",height:"100%"}}><TimelineView sel={sel} onSel={onSel} lang={lang} filtered={filtered}/></div>}
      </main>
      {ph&&<Sidebar key={ph.id+"-"+lang} p={ph} onClose={()=>setSel(null)} lang={lang} t={t} url={url} model={model} onConceptClick={idea=>{setConceptFilter(idea);setSel(null);}} onShare={shareLink}/>}
      {showCfg&&<OllamaModal url={url} model={model} onSave={(u,m)=>{setUrl(u);setModel(m);}} onClose={()=>setShowCfg(false)}/>}
      {toast&&(
        <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",
          background:"rgba(6,12,8,.96)",border:"1px solid rgba(201,162,39,.4)",
          borderRadius:12,padding:"12px 24px",zIndex:500,
          color:"#F0E6D3",fontFamily:"Inter,sans-serif",fontSize:13.5,
          whiteSpace:"nowrap",animation:"fadeUp .3s ease both",
          boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
